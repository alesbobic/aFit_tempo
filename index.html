<!DOCTYPE html>

<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>aFit tempo</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<main class="app">
  <h1>aFit tempo</h1>
  <p class="subtitle">Intervalni timer za trening</p>

  <section class="timer-card">
    <div id="phase">DELO</div>
    <div id="time">00:30</div>
    <div id="round">Krog 1 / 8</div>
  </section>

  <section class="controls">
    <button onclick="start()">Start</button>
    <button onclick="pause()">Pavza</button>
    <button onclick="reset()">Reset</button>
  </section>

  <section class="settings">
    <h2>Nastavitve</h2>

    <label>
      Delo (sekunde)
      <input id="workInput" type="number" min="1" value="30" />
    </label>

    <label>
      Počitek (sekunde)
      <input id="restInput" type="number" min="1" value="10" />
    </label>

    <label>
      Krogi
      <input id="roundsInput" type="number" min="1" value="8" />
    </label>

    <button class="secondary" onclick="saveSettings()">Shrani</button>
    <button class="secondary" onclick="testSound()">Test zvoka</button>
    <button class="secondary" onclick="toggleFullscreen()">Fullscreen</button>
  </section>
</main>

<!-- 🔊 PRO zvoki -->
<audio id="workSound" src="assets/sounds/go.wav" preload="auto"></audio>
<audio id="restSound" src="assets/sounds/rest.wav" preload="auto"></audio>
<audio id="endSound" src="assets/sounds/finish.wav" preload="auto"></audio>

<script src="js/app.js"></script>
</body>
</html>
